stages:

  # ─────────────────────────────────────────
  # Stage 1: Download / refresh raw data
  # ─────────────────────────────────────────
  get_data:
    cmd: python dataset.py
    deps:
      - dataset.py
    outs:
      - data/train.csv
      - data/test.csv

  # ─────────────────────────────────────────
  # Stage 2: Data cleaning
  # ─────────────────────────────────────────
  clean:
    cmd: python clean_data.py
    deps:
      - clean_data.py
      - steps/clean.py
      - data/train.csv
      - data/test.csv
    outs:
      - data/train_clean.csv
      - data/test_clean.csv

  # ─────────────────────────────────────────
  # Stage 3: Model training + MLflow logging
  # ─────────────────────────────────────────
  train:
    cmd: python main.py
    deps:
      - main.py
      - steps/ingest.py
      - steps/clean.py
      - steps/train.py
      - steps/predict.py
      - data/train_clean.csv
      - data/test_clean.csv
      - config.yml
    params:
      - config.yml:
          - model.name
          - model.params
          - train.test_size
          - train.random_state
          - train.shuffle
    outs:
      - models/model.pkl
    metrics:
      - metrics.json:
          cache: false

  # ─────────────────────────────────────────
  # Stage 4: Unit tests
  # ─────────────────────────────────────────
  test:
    cmd: python -m pytest tests/ -v --tb=short
    deps:
      - tests/test_ingest.py
      - tests/test_clean.py
      - steps/ingest.py
      - steps/clean.py
      - data/train.csv
      - data/test.csv
