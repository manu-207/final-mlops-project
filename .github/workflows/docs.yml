name: MLOps CI Pipeline (DVC + S3 + MLflow)

on:
  push:
    branches: [ main ]

jobs:
  train-evaluate:
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_EXPERIMENT_NAME: manu7-mlops
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-south-1

    steps:
      # 🔹 Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🔹 Step 2: Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 🔹 Step 3: Install dependencies (FORCED FIX)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          # 🔴 Remove conflicting packages if preinstalled
          pip uninstall -y dvc pathspec || true

          # 🔴 Install compatible versions FIRST
          pip install "pathspec<0.12"
          pip install "dvc[s3]==3.59.0"

          # Install remaining packages
          pip install mlflow==2.12.1 scikit-learn==1.4.2 dagshub

      # 🔹 Step 4: Debug versions (IMPORTANT)
      - name: Debug versions
        run: |
          pip list | grep dvc
          pip list | grep pathspec

      # 🔹 Step 5: Verify DVC
      - name: Check DVC version
        run: dvc --version

      # 🔹 Step 6: Pull data from S3
      - name: DVC Pull
        run: dvc pull

      # 🔹 Step 7: Run pipeline
      - name: Run DVC Pipeline
        run: dvc repro

      # 🔹 Step 8: Push updated artifacts (optional)
      - name: DVC Push
        run: dvc push
