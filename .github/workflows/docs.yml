name: MLOps CI Pipeline (DVC + S3 + MLflow)

on:
  push:
    branches: [ main ]

jobs:
  train-evaluate:
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_EXPERIMENT_NAME: manu7-mlops
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-south-1

    steps:
      # 🔹 Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🔹 Step 2: Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 🔹 Step 3: Install dependencies (FIXED)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 🔹 Step 4: Verify DVC
      - name: Check DVC version
        run: dvc --version

      # 🔹 Step 5: Pull data from S3
      - name: DVC Pull
        run: dvc pull

      # 🔹 Step 6: Run pipeline (train + evaluate)
      - name: Run DVC Pipeline
        run: dvc repro

      # 🔹 Step 7: (Optional) Push updated artifacts to S3
      - name: DVC Push (optional)
        run: dvc push
